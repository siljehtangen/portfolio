<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#fffaf7" id="theme-color-meta">
    <script>
      (function () {
        try {
          var loc = localStorage.getItem('portfolio-locale')
          document.documentElement.lang = loc === 'no' ? 'no' : 'en'
        } catch (e) {
          document.documentElement.lang = 'en'
        }
      })()
    </script>
    <script>
      (function () {
        try {
          var k = 'portfolio-theme'
          var s = localStorage.getItem(k)
          var dark =
            s === 'dark' || (s !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light'
          var m = document.getElementById('theme-color-meta')
          if (m) m.setAttribute('content', dark ? '#1c1614' : '#fffaf7')
        } catch (e) {}
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Silje - Portfolio</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
